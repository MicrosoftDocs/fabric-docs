# YamlMime:ZonePivotGroups
groups:
- id: event-streams-standard-enhanced
  title: Eventstreams enhanced and standard capabilities
  prompt: Choose the capabilities of eventstreams
  pivots:
  - id: enhanced-capabilities
    title: Enhanced capabilities
  - id: standard-capabilities
    title: Standard capabilities
- id: event-hubs-capabilities
  title: Event Hubs integration capabilities
  prompt: Select Extended Features when using schemas; otherwise, choose Basic Features.
  pivots:
  - id: basic-features
    title: Basic features
  - id: extended-features
    title: Extended features (Schema support)
- id: iot-hub-capabilities
  title: Azure IoT Hub integration capabilities
  prompt: Select Extended features when using a Streaming vNet data gateway; otherwise, choose Basic features.
  pivots:
  - id: basic-features
    title: Basic features
  - id: extended-features
    title: Extended features